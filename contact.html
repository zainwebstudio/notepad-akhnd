<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Uzairr</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="page-scale">

        <!-- ============ NAV ============ -->
        <header class="site-header">
            <div class="header-inner">
                <a href="index.html" class="logo">
                    <img src="Uzairr2.png" alt="Uzairr">
                </a>

                <nav class="main-nav" id="mainNav">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="brands.html" class="nav-link">Brands</a>
                    <a href="fonts.html" class="nav-link">Fonts</a>
                    <a href="about.html" class="nav-link">About</a>
                    <a href="contact.html" class="nav-link is-active">Contact</a>
                </nav>

                <button class="nav-toggle" id="navToggle" aria-label="Open menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </header>

        <main>

            <!-- ============ PAGE HERO ============ -->
            <section class="page-hero">
                <p class="hero-eyebrow reveal">Let's Work Together</p>
                <h1 class="page-title reveal">Contact</h1>
                <img class="hero-mark" src="assets/main_logo.jpeg" alt="" aria-hidden="true">
            </section>

            <!-- ============ CONTACT: image + form ============ -->
            <section class="contact-layout">

                <div class="contact-image reveal">
                    <img src="assets/place_holder_for_images_temprory.jpeg" alt="Uzairr">
                </div>

                <div class="contact-form-wrap reveal">

                    <div class="contact-card">
                        <p class="contact-intro">Have a project in mind? Let's talk.</p>

                        <form id="contactForm" class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID"
                            method="POST">

                            <!-- Name -->
                            <div class="form-group">
                                <label for="name">Full Name</label>
                                <input type="text" id="name" name="name" required autocomplete="name"
                                    placeholder="Your name here">
                            </div>

                            <!-- Email -->
                            <div class="form-group">
                                <label for="email">Email Address</label>
                                <input type="email" id="email" name="email" required autocomplete="email"
                                    placeholder="you@domain.com">
                            </div>

                            <!-- Estimate Deadline -->
                            <div class="form-group">
                                <label for="deadline">Estimate Deadline</label>
                                <input type="text" id="deadline" name="deadline"
                                    placeholder="e.g. 3 weeks / December 2026">
                            </div>

                            <!-- Estimate Budget -->
                            <div class="form-group">
                                <label for="budget">Estimate Budget (USD)</label>
                                <input type="text" id="budget" name="budget" placeholder="e.g. $2,000 - $5,000">
                            </div>

                            <!-- Brief Project Description -->
                            <div class="form-group">
                                <label for="message">Brief Project Description</label>
                                <textarea id="message" name="message" rows="4" required
                                    placeholder="Tell me about your brand, the scope of work, or your vision..."></textarea>
                            </div>

                            <button type="submit" class="btn-submit">
                                Send Message
                            </button>

                            <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
                        </form>
                    </div>
                </div>
            </section>

        </main>

        <!-- ============ FOOTER ============ -->
        <footer class="site-footer">
            <div class="footer-inner">
                <div class="footer-social">
                    <a href="https://www.fiverr.com/muhammaduzai914" target="_blank" rel="noopener noreferrer"
                        class="social-link">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="1.6">
                            <path d="M4 8h11a4 4 0 0 1 4 4v8M4 12h11M4 16h8" />
                        </svg>
                        <span>Fiverr</span>
                    </a>
                    <a href="https://www.instagram.com/designbyuzairr" target="_blank" rel="noopener noreferrer"
                        class="social-link">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="1.6">
                            <rect x="3" y="3" width="18" height="18" rx="5" />
                            <circle cx="12" cy="12" r="4" />
                            <circle cx="17.2" cy="6.8" r="0.6" fill="currentColor" stroke="none" />
                        </svg>
                        <span>Instagram</span>
                    </a>
                    <a href="https://www.linkedin.com/in/uzairr/" target="_blank" rel="noopener noreferrer"
                        class="social-link">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="1.6">
                            <rect x="3" y="3" width="18" height="18" rx="3" />
                            <line x1="7.5" y1="10" x2="7.5" y2="16.5" />
                            <circle cx="7.5" cy="7" r="0.9" fill="currentColor" stroke="none" />
                            <path d="M11.5 16.5V10M11.5 12.5c0-1.4 1.1-2.5 2.5-2.5s2.3 1.1 2.3 2.5v4" />
                        </svg>
                        <span>LinkedIn</span>
                    </a>
                </div>

                <p>&#169; 2026 Uzairr</p>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
    <script src="js/scale.js"></script>
</body>

</html>
